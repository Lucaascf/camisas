# Nginx — Reverse Proxy para FERRATO (Gunicorn na porta 8000)
#
# Instruções:
#   1. Substitua SEU_DOMINIO.com pelo domínio real
#   2. sudo cp nginx.conf /etc/nginx/sites-available/ferrato
#   3. sudo ln -s /etc/nginx/sites-available/ferrato /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. Obtenha SSL: sudo certbot --nginx -d SEU_DOMINIO.com -d www.SEU_DOMINIO.com

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Certbot usa este caminho para o desafio ACME antes de instalar o SSL
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # --- SSL (gerado pelo Certbot — não editar manualmente) ---
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Segurança extra ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # --- Logs ---
    access_log /var/log/nginx/ferrato_access.log;
    error_log  /var/log/nginx/ferrato_error.log warn;

    # --- Limites de upload (imagens do admin) ---
    client_max_body_size 16M;

    # --- Arquivos estáticos servidos diretamente pelo Nginx ---
    location /static/ {
        alias /var/www/ferrato/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Favicon ---
    location /favicon.ico {
        alias /var/www/ferrato/app/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # --- Tudo o mais vai para o Gunicorn ---
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
