<!-- ==================== HEADER ==================== -->
<header class="header">
    <div class="header__top">
        Frete grátis para compras acima de R$ 499
    </div>
    <div class="header__main">
        <a href="{{ url_for('main.home') }}" class="header__logo">FERRATO</a>
        <nav class="header__nav">
            {% for cat in nav_categories %}
            <a href="{{ url_for('shop.listagem', slug=cat.slug) }}" class="header__nav-link">{{ cat.nome }}</a>
            {% endfor %}
        </nav>
        <div class="header__actions">
            <button class="header__action-btn" aria-label="Buscar">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            </button>

            <div class="header__account">
                <button class="header__action-btn" aria-label="Minha conta" id="account-toggle">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <div class="header__account-dropdown" id="account-dropdown">
                    {% if current_user.is_authenticated %}
                        <div class="header__account-user">
                            <p class="header__account-name">{{ current_user.nome }}</p>
                            <p class="header__account-email">{{ current_user.email }}</p>
                        </div>
                        <a href="{{ url_for('auth.logout') }}" class="header__account-link">Sair</a>
                    {% else %}
                        <a href="{{ url_for('auth.login') }}" class="header__account-link">Entrar</a>
                        <a href="{{ url_for('auth.registro') }}" class="header__account-link">Criar conta</a>
                    {% endif %}
                </div>
            </div>

            <a href="{{ url_for('cart.ver_carrinho') }}" class="header__action-btn" aria-label="Carrinho">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="header__cart-count" id="cart-badge" {% if not cart_item_count %}style="display:none"{% endif %}>{{ cart_item_count }}</span>
            </a>
        </div>
    </div>
</header>
