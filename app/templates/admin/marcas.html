{% extends "base_admin.html" %}

{% block page_title %}Marcas{% endblock %}

{% block conteudo %}
<div class="admin-dashboard">
    <div class="admin-dashboard__header">
        <a href="{{ url_for('admin.nova_marca') }}" class="admin-btn admin-btn--primary">+ Nova Marca</a>
    </div>

    <div class="admin-table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Slug</th>
                    <th width="100">Produtos</th>
                    <th width="200">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for marca in marcas %}
                <tr>
                    <td><strong>{{ marca.nome }}</strong></td>
                    <td><code>{{ marca.slug }}</code></td>
                    <td>{{ marca.products | length }}</td>
                    <td class="admin-table__actions">
                        <a href="{{ url_for('admin.editar_marca', id=marca.id) }}" class="admin-btn admin-btn--small">Editar</a>
                        <form method="POST" action="{{ url_for('admin.deletar_marca', id=marca.id) }}" style="display:inline"
                              onsubmit="return confirm('Deletar marca \'{{ marca.nome }}\'? Esta ação não pode ser desfeita.')">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="admin-btn admin-btn--small admin-btn--danger"
                                    {% if marca.products %}disabled title="Possui produtos associados"{% endif %}>
                                Deletar
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align:center; padding: 2rem; color: var(--admin-text-muted);">
                        Nenhuma marca cadastrada.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
