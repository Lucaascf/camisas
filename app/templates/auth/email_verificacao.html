<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código de Verificação - FERRATO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #FAFAFA;
            color: #1A1A1A;
        }
        .email-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #FFFFFF;
            border: 1px solid #E5E5E5;
        }
        .email-header {
            background-color: #1f2937;
            padding: 30px 40px;
            text-align: center;
        }
        .email-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 600;
            color: #C8A35F;
            letter-spacing: 2px;
            margin: 0;
        }
        .email-body {
            padding: 40px;
        }
        .email-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 24px;
            font-weight: 600;
            color: #1A1A1A;
            margin: 0 0 20px 0;
            text-align: center;
        }
        .email-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1A1A1A;
            margin: 0 0 30px 0;
            text-align: center;
        }
        .codigo-container {
            background-color: #FAFAFA;
            border: 2px solid #C8A35F;
            padding: 30px;
            text-align: center;
            margin: 30px 0;
        }
        .codigo {
            font-size: 36px;
            font-weight: 700;
            color: #1f2937;
            letter-spacing: 8px;
            margin: 0;
            font-family: 'Courier New', monospace;
        }
        .email-hint {
            font-size: 14px;
            color: #8B8B8B;
            text-align: center;
            margin: 20px 0;
        }
        .email-footer {
            background-color: #FAFAFA;
            padding: 20px 40px;
            text-align: center;
            border-top: 1px solid #E5E5E5;
        }
        .email-footer__text {
            font-size: 12px;
            color: #8B8B8B;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1 class="email-logo">FERRATO</h1>
        </div>

        <div class="email-body">
            <h2 class="email-title">Bem-vindo à FERRATO</h2>

            <p class="email-text">
                Para concluir seu cadastro, utilize o código de verificação abaixo:
            </p>

            <div class="codigo-container">
                <p class="codigo">{{ codigo }}</p>
            </div>

            <p class="email-hint">
                Este código expira em 10 minutos e pode ser usado apenas uma vez.
            </p>

            <p class="email-text">
                Se você não solicitou este cadastro, ignore este email.
            </p>
        </div>

        <div class="email-footer">
            <p class="email-footer__text">
                &copy; 2026 FERRATO - Camisas Masculinas de Luxo
            </p>
        </div>
    </div>
</body>
</html>
